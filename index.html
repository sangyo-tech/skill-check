        const questions = [

            {
                text: "「品質」の定義として最も適切なものは？",
                options: [
                    { text: "製品の見た目が美しいこと", correct: false },
                    { text: "お客様の期待にどれだけ応えているかの度合い", correct: true },
                    { text: "不良品が出ないこと", correct: false },
                    { text: "価格が安いこと", correct: false }
                ],
                category: "基礎知識"
            },
            {
                text: "PDCAサイクルの「C」は何を意味する？",
                options: [
                    { text: "Change", correct: false },
                    { text: "Control", correct: false },
                    { text: "Check", correct: true },
                    { text: "Cost", correct: false }
                ],
                category: "基礎知識"
            },
            {
                text: "「後工程はお客様」の考え方で正しいものは？",
                options: [
                    { text: "次の工程に品質を保証して渡す", correct: true },
                    { text: "最終顧客だけを考えればよい", correct: false },
                    { text: "後工程の要望は聞かなくてよい", correct: false },
                    { text: "自工程さえよければよい", correct: false }
                ],
                category: "基礎知識"
            },
            // QCツール（Q4-Q6）
            {
                text: "パレート図の主な目的は？",
                options: [
                    { text: "工程の時系列変化を見る", correct: false },
                    { text: "重要な少数の問題を特定する", correct: true },
                    { text: "2つの変数の関係を見る", correct: false },
                    { text: "データのばらつきを見る", correct: false }
                ],
                category: "QCツール"
            },
            {
                text: "特性要因図の別名は？",
                options: [
                    { text: "散布図", correct: false },

        // グローバル変数
        let currentQuestion = 0;
        let userAnswers = [];
        let score = 0;

        function startQuiz() {
            currentQuestion = 0;
            userAnswers = [];
            score = 0;
            showScreen('quizScreen');
            displayQuestion();
        }

        function displayQuestion() {
            const question = questions[currentQuestion];

            document.getElementById('questionNumber').textContent = currentQuestion + 1;
            document.getElementById('currentQuestion').textContent = currentQuestion + 1;
            document.getElementById('questionText').textContent = question.text;

            const progressPercent = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progressPercent + '%';

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const labels = ['A', 'B', 'C', 'D'];
            question.options.forEach((option, index) => {
                const optionCard = document.createElement('div');
                optionCard.className = 'option-card';
                optionCard.innerHTML = `
                    <div class="option-label">${labels[index]}</div>
                    <div class="option-text">${option.text}</div>
                `;
                optionCard.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionCard);
            });
        }

        function selectOption(index) {
            const question = questions[currentQuestion];
            const isCorrect = question.options[index].correct;

            userAnswers.push({
                questionIndex: currentQuestion,
                selectedIndex: index,
                correct: isCorrect,
                category: question.category
            });

            if (isCorrect) {
                score++;
            }

            // 次の質問へ進む
            currentQuestion++;
            if (currentQuestion < questions.length) {
                displayQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const categoryScores = {
                '基礎知識': 0,
                'QCツール': 0,
                'マネジメント': 0,
                '問題解決': 0,
                '専門知識': 0
            };

            userAnswers.forEach(answer => {
                if (answer.correct) {
                    categoryScores[answer.category]++;
                }
            });

            // レベル判定
            let levelIndex;
            if (score <= 3) levelIndex = 0;
            else if (score <= 6) levelIndex = 1;
            else if (score <= 9) levelIndex = 2;
            else if (score <= 12) levelIndex = 3;
            else levelIndex = 4;

            const level = levelInfo[levelIndex];

            // 結果画面を更新
            document.getElementById('levelBadge').textContent = level.level;
            document.getElementById('scoreDisplay').innerHTML = `<strong>正答数: ${score}/15問</strong>`;
            document.getElementById('levelDescription').textContent = level.description;

            // 推奨コースを表示
            const coursesGrid = document.getElementById('coursesGrid');
            coursesGrid.innerHTML = '';
            level.courses.forEach(course => {
                const courseCard = document.createElement('div');
                courseCard.className = 'course-card';
                courseCard.innerHTML = `
                    <div class="course-name">${course.name}</div>
                    <div class="course-description">${course.description}</div>
                `;
                coursesGrid.appendChild(courseCard);
            });

            // レーダーチャートを描画
            drawRadarChart(categoryScores);

            showScreen('resultScreen');
        }

        function drawRadarChart(categoryScores) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');

            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = 120;

            // キャンバスをクリア
            ctx.fillStyle = 'rgba(10, 22, 40, 0.5)';
            ctx.fillRect(0, 0, width, height);

            const categories = ['基礎知識', 'QCツール', 'マネジメント', '問題解決', '専門知識'];
            const angles = categories.map((_, i) => (i * 2 * Math.PI) / categories.length);

            // グリッド線とラベルを描画
            ctx.strokeStyle = 'rgba(200, 168, 78, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                const currentRadius = ((i + 1) / 5) * radius;
                ctx.beginPath();
                for (let j = 0; j < angles.length; j++) {
                    const x = centerX + currentRadius * Math.cos(angles[j] - Math.PI / 2);
                    const y = centerY + currentRadius * Math.sin(angles[j] - Math.PI / 2);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }

            // カテゴリラベルを描画
            ctx.fillStyle = '#c8a84e';
            ctx.font = 'bold 13px "Meiryo", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            categories.forEach((category, i) => {
                const x = centerX + (radius + 40) * Math.cos(angles[i] - Math.PI / 2);
                const y = centerY + (radius + 40) * Math.sin(angles[i] - Math.PI / 2);
                ctx.fillText(category, x, y);
            });

            // データを描画
            const scores = categories.map(cat => categoryScores[cat] || 0);
            const maxScore = 3;

            ctx.fillStyle = 'rgba(200, 168, 78, 0.3)';
            ctx.strokeStyle = '#c8a84e';
            ctx.lineWidth = 2;
            ctx.beginPath();

            scores.forEach((score, i) => {
                const ratio = Math.min(score / maxScore, 1);
                const x = centerX + (ratio * radius) * Math.cos(angles[i] - Math.PI / 2);
                const y = centerY + (ratio * radius) * Math.sin(angles[i] - Math.PI / 2);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // データポイントを描画
            ctx.fillStyle = '#c8a84e';
            scores.forEach((score, i) => {
                const ratio = Math.min(score / maxScore, 1);
                const x = centerX + (ratio * radius) * Math.cos(angles[i] - Math.PI / 2);
                const y = centerY + (ratio * radius) * Math.sin(angles[i] - Math.PI / 2);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                ctx.fill();
            });

            // スコア値を描画
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px "Meiryo", sans-serif';
            scores.forEach((score, i) => {
                const ratio = Math.min(score / maxScore, 1);
                const x = centerX + (ratio * radius * 0.7) * Math.cos(angles[i] - Math.PI / 2);
                const y = centerY + (ratio * radius * 0.7) * Math.sin(angles[i] - Math.PI / 2);
                ctx.fillText(`${score}`, x, y);
            });
        }

            showScreen('startScreen');
            currentQuestion = 0;
            userAnswers = [];
            score = 0;
        }

            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }
